version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 25
    cooldown:
      default-days: 1
    labels:
      - "dependencies"
    commit-message:
      prefix: "dependabot"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 25
    cooldown:
      default-days: 1
    labels:
      - "dependencies"
    commit-message:
      prefix: "dependabot"
      include: "scope"
