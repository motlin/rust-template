# Jobs that run on pull_request, but not on merge_group. This is useful for jobs that post comments on Pull Requests.

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  forbid-merge-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: motlin/forbid-merge-commits-action@main

  automerge-dependabot:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Enable auto-merge for Dependabot PR
        run: gh pr merge --rebase --auto "${{ github.event.pull_request.number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  fmt-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: jdx/mise-action@v4
        with:
          cache: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "github-actions@github.com"

      - name: Run cargo fmt
        run: |
          cargo fmt --all

          if [[ -n $(git status --porcelain) ]]; then
            FIX_BRANCH="fix-${{ github.event.pull_request.number }}-fmt"
            git switch --create $FIX_BRANCH

            git add --all
            git commit --message "Apply cargo fmt fixes."
            git push --force origin $FIX_BRANCH

            echo "cargo fmt fixes have been pushed to the $FIX_BRANCH branch."
            exit 1
          else
            echo "No changes needed by cargo fmt"
          fi

  clippy-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: jdx/mise-action@v4
        with:
          cache: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('Cargo.lock') }}

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "github-actions@github.com"

      - name: Run cargo clippy --fix
        run: |
          cargo clippy --fix --allow-dirty --allow-no-vcs --all-targets --all-features

          if [[ -n $(git status --porcelain) ]]; then
            FIX_BRANCH="fix-${{ github.event.pull_request.number }}-clippy"
            git switch --create $FIX_BRANCH

            git add --all
            git commit --message "Apply cargo clippy fixes."
            git push --force origin $FIX_BRANCH

            echo "cargo clippy fixes have been pushed to the $FIX_BRANCH branch."
            exit 1
          else
            echo "No changes needed by cargo clippy"
          fi

  pre-commit-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: jdx/mise-action@v4
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "github-actions@github.com"

      - name: Run pre-commit
        run: |
          pre-commit run --all-files || true

          if [[ -n $(git status --porcelain) ]]; then
            FIX_BRANCH="fix-${{ github.event.pull_request.number }}-pre-commit"
            git switch --create $FIX_BRANCH

            git add --all
            git commit --message "Apply pre-commit fixes."
            git push --force origin $FIX_BRANCH

            echo "pre-commit fixes have been pushed to the $FIX_BRANCH branch."
            exit 1
          else
            echo "No changes needed by pre-commit"
          fi
